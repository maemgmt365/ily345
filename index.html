<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>345</title>

  <style>
    :root{
      --bg:#f6f1e7;
      --text:#1f1a14;
      --muted:#6b6258;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:-apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    }

    body{
      background:var(--bg);
      color:var(--text);
    }

    .container{
      max-width:1100px;
      margin:auto;
      padding:40px 20px;
    }

    header{
      text-align:center;
      margin-bottom:80px;
      font-size:28px;
      letter-spacing:8px;
    }

    .hero{
      text-align:center;
      margin-bottom:100px;
    }

    .hero h1{
      font-size:48px;
      font-weight:500;
      margin-bottom:20px;
    }

    .hero p{
      color:var(--muted);
      font-size:18px;
      margin-bottom:30px;
    }

    .btn{
      display:inline-block;
      padding:14px 28px;
      border:1px solid var(--text);
      text-decoration:none;
      color:var(--text);
      transition:.2s;
    }

    .btn:hover{
      background:var(--text);
      color:white;
    }

    .products{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:40px;
      margin-bottom:120px;
    }

    .product{
      text-align:center;
    }

    .product img{
      width:100%;
      margin-bottom:20px;
    }

    .product h3{
      margin-bottom:10px;
      font-weight:500;
    }

    .message{
      text-align:center;
      margin-bottom:120px;
      max-width:600px;
      margin-left:auto;
      margin-right:auto;
    }

    .message p{
      font-size:22px;
      line-height:1.6;
    }

    .gallery{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:20px;
    }

    .gallery img{
      width:100%;
      height:250px;
      object-fit:cover;
    }

    footer{
      text-align:center;
      margin-top:100px;
      color:var(--muted);
      font-size:14px;
    }

  </style>
</head>

<body>

  <div class="container">

    <header>
      3 4 5
    </header>

    <section class="hero">
      <h1>love yours.</h1>
      <p>A reminder. A message. A gift.</p>
      <a href="#shop" class="btn">Shop 345</a>
    </section>

    <section id="shop" class="products">

      <!-- HOODIE -->
      <div class="product">
        <img src="images/unisex-oversized-heavyweight-hoodie-white-front-69bf04d905e12.png" />
        <h3>Oversized Hoodie</h3>
        <a href="https://345loveyours.printful.me/product/love-yours-oversized-logo-hoodie" class="btn">Shop</a>
      </div>

      <!-- TEE -->
      <div class="product">
        <img src="images/mens-premium-heavyweight-tee-black-front-69bf0732df35c.jpeg" />
        <h3>T-Shirt</h3>
        <a href="https://345loveyours.printful.me/product/t-shirt-345-message" class="btn">Shop</a>
      </div>

      <!-- HAT -->
      <div class="product">
        <img src="images/distressed-dad-hat-khaki-front-69bf05bbb47bb.jpeg" />
        <h3>Distressed Hat</h3>
        <a href="https://345loveyours.printful.me/product/love-yours-distressed-hat" class="btn">Shop</a>
      </div>

    </section>

    <section class="message">
      <p>
        A simple way to send a message.<br><br>
        To yourself.<br>
        Or someone you love.
      </p>
    </section>

    <section class="gallery">
      <img src="images/unisex-oversized-heavyweight-hoodie-white-front-69bf04d90714f.jpeg">
      <img src="images/mens-premium-heavyweight-tee-black-front-69bf0732df35c.jpeg">
      <img src="images/distressed-dad-hat-khaki-front-69bf05bbb47bb.jpeg">
    </section>

    <footer>
      © 345
    </footer>

  </div>

</body>
</html>
