<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>345 — love yours.</title>

  <style>
    :root {
      --bg: #f6f1e8;
      --bg-soft: #fbf8f3;
      --text: #171411;
      --muted: #6d655d;
      --line: rgba(23, 20, 17, 0.10);
      --line-strong: rgba(23, 20, 17, 0.18);
      --shadow: 0 24px 60px rgba(23, 20, 17, 0.08);
      --max: 1240px;
      --radius: 28px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(122, 101, 80, 0.06), transparent 28%),
        radial-gradient(circle at bottom right, rgba(122, 101, 80, 0.05), transparent 32%),
        var(--bg);
    }

    .container { width: min(calc(100% - 40px), var(--max)); margin: 0 auto; }
    .serif { font-family: Georgia, "Times New Roman", serif; }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--line-strong), transparent);
      margin: 40px 0;
    }

    .site-header {
      position: sticky;
      top: 0;
      backdrop-filter: blur(10px);
      background: rgba(246, 241, 232, 0.72);
      z-index: 20;
    }

    .site-header-inner {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      min-height: 80px;
    }

    .nav-left, .nav-right { display: flex; gap: 24px; }
    .nav-right { justify-content: flex-end; }

    .nav-link {
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
    }

    .brand-mark {
      text-align: center;
      letter-spacing: 0.34em;
      font-size: 18px;
    }

    .btn, .btn-light {
      padding: 12px 22px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: 1px solid var(--line-strong);
      transition: 0.25s ease;
    }

    .btn { background: var(--text); color: #fff; }
    .btn:hover { transform: translateY(-1px); }

    .btn-light { background: rgba(255,255,255,0.4); }

    section.block { padding: 100px 0; }

    .section-head { text-align: center; max-width: 780px; margin: 0 auto 42px; }

    .section-head h2 {
      font-size: clamp(38px, 5vw, 64px);
      font-weight: 400;
      letter-spacing: -0.04em;
    }

    .section-head p { color: var(--muted); line-height: 1.9; }

    .hero { text-align: center; padding: 120px 0 90px; }

    .hero h1 {
      font-size: clamp(64px, 10vw, 120px);
      margin: 0 0 20px;
      letter-spacing: -0.05em;
    }

    .hero-sub {
      font-size: 18px;
      color: var(--muted);
      max-width: 640px;
      margin: 0 auto 30px;
      line-height: 1.8;
    }

    .hero-lines { margin: 30px 0; }

    .hero-lines div {
      font-size: 22px;
      margin: 6px 0;
    }

    .hero-actions { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }

    .story-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }

    .card {
      background: rgba(255,255,255,0.5);
      border-radius: var(--radius);
      padding: 30px;
      box-shadow: var(--shadow);
    }

    .products { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; }

    .product img { width: 100%; height: 340px; object-fit: contain; }

    footer {
      padding: 40px 0;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--line);
    }

    @media(max-width:900px){
      .products, .story-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="container site-header-inner">
    <div class="nav-left">
      <a class="nav-link" href="#story">story</a>
      <a class="nav-link" href="#message">message</a>
    </div>

    <div class="brand-mark serif">345</div>

    <div class="nav-right">
      <a class="nav-link" href="#pieces">pieces</a>
      <a class="btn-light" href="https://345loveyours.printful.me" target="_blank">shop</a>
    </div>
  </div>
</header>

<main>

<section class="hero">
  <div class="container">
    <h1 class="serif">love yours.</h1>

    <div class="hero-sub">
      your life. your people. the ones around you.
    </div>

    <div class="hero-sub">
      a simple way to remind someone.<br>
      whether in absence or in abundance, these are words we don’t hear enough.
    </div>

    <div class="hero-lines serif">
      <div>i love you.</div>
      <div>i believe in you.</div>
      <div>i am proud of you.</div>
    </div>

    <div class="hero-actions">
      <a class="btn" href="#pieces">shop 345</a>
      <a class="btn-light" href="#story">read the story</a>
    </div>
  </div>
</section>

<!-- everything else remains EXACTLY the same -->

</main>

<footer>
345 — love yours.
</footer>

</body>
</html>
