<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>345 — love yours.</title>

  <style>
    body {
      margin: 0;
      font-family: Georgia, 'Times New Roman', serif;
      background: #f6f1e8;
      color: #1b1712;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 40px 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 60px;
      font-size: 14px;
      letter-spacing: 2px;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #1b1712;
    }

    .hero {
      text-align: center;
      margin-bottom: 80px;
    }

    .hero h1 {
      font-size: 72px;
      font-weight: 400;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 22px;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 12px 28px;
      border: 1px solid #1b1712;
      text-decoration: none;
      color: #1b1712;
      transition: .2s;
    }

    .btn:hover {
      background: #1b1712;
      color: #fff;
    }

    .section {
      margin: 100px 0;
    }

    .section-title {
      text-align: center;
      font-size: 28px;
      margin-bottom: 40px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 40px;
    }

    .product {
      text-align: center;
    }

    .product img {
      width: 100%;
      height: 320px;
      object-fit: contain;
      margin-bottom: 15px;
    }

    .message {
      text-align: center;
      max-width: 600px;
      margin: auto;
      font-size: 20px;
      line-height: 1.6;
    }

    footer {
      text-align: center;
      margin-top: 120px;
      font-size: 12px;
      color: #6b6258;
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- NAV -->
    <header>
      <div>345</div>
      <nav>
        <a href="#shop">Shop</a>
        <a href="#message">Message</a>
        <a href="https://345loveyours.printful.me" target="_blank">Printful</a>
      </nav>
    </header>

    <!-- HERO -->
    <div class="hero">
      <h1>love yours.</h1>
      <p>for the moments when words go unsaid.</p>
      <a class="btn" href="#shop">shop now</a>
    </div>

    <!-- MESSAGE -->
    <div id="message" class="section">
      <div class="section-title">the message</div>
      <div class="message">
        345 is a reminder.
        <br><br>
        to yourself.
        <br>
        or someone you love.
        <br><br>
        i love you.
        <br>
        i believe in you.
        <br>
        i am proud of you.
      </div>
    </div>

    <!-- SHOP -->
    <div id="shop" class="section">
      <div class="section-title">shop</div>

      <div class="products">

        <div class="product">
          <img src="./unisex-oversized-heavyweight-hoodie-white-front-69bf04d905e12.png">
          <a class="btn" href="https://345loveyours.printful.me" target="_blank">hoodie</a>
        </div>

        <div class="product">
          <img src="./mens-premium-heavyweight-tee-black-front-69bf0732df35c.png">
          <a class="btn" href="https://345loveyours.printful.me" target="_blank">t-shirt</a>
        </div>

        <div class="product">
          <img src="./distressed-dad-hat-khaki-front-69bf05bbb47bb.png">
          <a class="btn" href="https://345loveyours.printful.me" target="_blank">hat</a>
        </div>

      </div>

    </div>

    <!-- FOOTER -->
    <footer>
      345 — love yours.
    </footer>

  </div>

</body>
</html>
